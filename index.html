<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 📱 iPhone fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Breathing Subtitles</title>

<style>
  body {
    margin: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    overflow: hidden;
  }

  #word {
    color: white;
    font-weight: bold;
    text-align: center;
    max-width: 90vw;
    word-break: break-word;
  }

  button {
    position: fixed;
    font-size: 16px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: white;
    color: black;
  }

  #addBtn { bottom: 20px; right: 20px; }
  #exportBtn { bottom: 20px; right: 80px; }
  #importBtn { bottom: 20px; right: 140px; }
</style>
</head>

<body>

<div id="word">Start</div>

<button id="addBtn">＋</button>
<button id="exportBtn">⬇️</button>
<button id="importBtn">⬆️</button>
<input type="file" id="importFile" style="display:none" />

<script>
const wordEl = document.getElementById("word");
const addBtn = document.getElementById("addBtn");
const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const importFile = document.getElementById("importFile");

let words = [];
let index = 0;
let isRunning = false;
let bufferTimer = null;

// 🔄 LOAD FUNCTION (AUTO SYNC)
function loadDictionary() {
  return JSON.parse(localStorage.getItem("dictionary") || "{}");
}

let dictionary = loadDictionary();
let lastHeardWord = "";

// 🎤 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = false;

recognition.onresult = (event) => {
  const text = event.results[event.results.length - 1][0].transcript;

  clearTimeout(bufferTimer);

  bufferTimer = setTimeout(() => {
    words = text
      .toLowerCase()
      .replace(/[.,!?]/g, "")
      .trim()
      .split(" ");

    index = 0;

    if (words.length > 0) {
      lastHeardWord = words[words.length - 1];
    }

  }, 400);
};

// 🔁 AUTO-RESTART (STABILITET)
recognition.onend = () => recognition.start();
recognition.onerror = () => recognition.start();

// ▶️ WORD ENGINE
function processWords() {
  if (!isRunning) return;

  if (index < words.length) {
    let word = words[index].toLowerCase();

    if (dictionary[word]) {
      word = dictionary[word];
    }

    wordEl.textContent = word;

    // 🔠 DYNAMISK TEXTSTORLEK
    const length = word.length;
    let size;

    if (length <= 4) size = "18vw";
    else if (length <= 8) size = "14vw";
    else if (length <= 12) size = "10vw";
    else size = "7vw";

    wordEl.style.fontSize = size;

    index++;

    const delay = 250 + word.length * 25;

    setTimeout(processWords, delay);
  } else {
    setTimeout(processWords, 100);
  }
}

// ➕ LÄGG TILL ORD
addBtn.onclick = () => {
  const correct = prompt("Skriv rätt ord:");
  if (!correct) return;

  if (lastHeardWord) {
    dictionary[lastHeardWord] = capitalize(correct);
    localStorage.setItem("dictionary", JSON.stringify(dictionary));
    dictionary = loadDictionary(); // 🔥 sync direkt
    alert("Sparat!");
  }
};

// ⬇️ EXPORT
exportBtn.onclick = () => {
  const dataStr = JSON.stringify(dictionary, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "dictionary.json";
  a.click();
  URL.revokeObjectURL(url);
};

// ⬆️ IMPORT
importBtn.onclick = () => importFile.click();

importFile.onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      dictionary = { ...dictionary, ...imported };
      localStorage.setItem("dictionary", JSON.stringify(dictionary));
      dictionary = loadDictionary(); // 🔥 sync direkt
      alert("Importerat!");
    } catch {
      alert("Fel fil");
    }
  };

  reader.readAsText(file);
};

// 🔄 AUTO SYNC när appen öppnas igen
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    dictionary = loadDictionary();
  }
});

function capitalize(word) {
  return word.charAt(0).toUpperCase() + word.slice(1);
}

function start() {
  if (!isRunning) {
    dictionary = loadDictionary(); // 🔥 alltid senaste
    isRunning = true;
    processWords();
  }
}

recognition.start();
start();
</script>

</body>
</html>
