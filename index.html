<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#word {
  color: white;
  font-weight: bold;
  text-align: center;
  max-width: 90vw;
  line-height: 1.2;
}
</style>
</head>

<body>

<div id="word">Start</div>

<script>
const wordEl = document.getElementById("word");

// 🔌 SERVER CONNECTION
const socket = new WebSocket("wss://speech-server-0b86.onrender.com");

// 🧠 dictionary
let dictionary = JSON.parse(localStorage.getItem("dictionary") || {});
let lastText = "";

// 🎤 MICROPHONE
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  const mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.start(100); // 🔥 snabbare

  mediaRecorder.ondataavailable = (e) => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };
});

// 🔥 TEXT FLOW (STABIL)
socket.onmessage = (event) => {
  let text = event.data
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .trim();

  if (!text || text === lastText) return;
  lastText = text;

  let words = text.split(" ").filter(Boolean);

  let chunk = words.slice(-3);

  chunk = chunk.map(w => dictionary[w] || w);

  const display = chunk.join(" ");
  wordEl.textContent = display;

  // 🔠 dynamisk storlek
  const length = display.length;

  if (length <= 10) wordEl.style.fontSize = "16vw";
  else if (length <= 20) wordEl.style.fontSize = "12vw";
  else if (length <= 30) wordEl.style.fontSize = "9vw";
  else wordEl.style.fontSize = "6vw";
};
</script>

</body>
</html>
