<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  font-size: 16px;
  padding: 10px;
  margin-right: 5px;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<div id="controls">
  <button id="addBtn">＋</button>
  <button id="exportBtn">⬇️</button>
  <button id="importBtn">⬆️</button>
  <input type="file" id="fileInput" hidden>
</div>

<script>
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

let identifiers = {};

let spellingMode = false;
let spelledLetters = [];
let lastProcessedText = "";
let lastLetter = "";

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// LOAD
async function loadIdentifiers() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    identifiers = {};
    data.forEach(row => {
      identifiers[row.heard] = row.correct;
    });
  } catch {}
}
loadIdentifiers();

// LIVE
recognition.onresult = (event) => {
  let fullText = "";

  for (let i = 0; i < event.results.length; i++) {
    fullText += event.results[i][0].transcript;
  }

  fullText = fullText.toLowerCase().trim();

  let newText = fullText.replace(lastProcessedText, "").trim();
  if (!newText) return;

  lastProcessedText = fullText;

  const words = newText.split(" ").filter(Boolean);
  const allWords = fullText.split(" ").filter(Boolean);
  const joined = words.join("");

  // START SPELLING
  if (
    joined.includes("dingdongstart") ||
    (joined.includes("dingdong") && joined.includes("start"))
  ) {
    spellingMode = true;
    spelledLetters = [];
    lastLetter = "";
    lastProcessedText = "";
    line2.textContent = "…";
    return;
  }

  // END SPELLING
  if (
    spellingMode &&
    (
      joined.includes("dingdongstopp") ||
      (joined.includes("dingdong") && joined.includes("stopp"))
    )
  ) {
    const name = spelledLetters.join("");

    identifiers[name.toLowerCase()] = name;

    fetch(SUPABASE_URL + "/rest/v1/names", {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify([{ heard: name.toLowerCase(), correct: name }])
    });

    spellingMode = false;
    lastProcessedText = "";

    line2.textContent = name;
    line1.textContent = "";
    return;
  }

  // SPELLING MODE
  if (spellingMode) {
    words.forEach(w => {
      const letter = w[0];
      if (!letter.match(/[a-zåäö]/)) return;
      if (letter === lastLetter) return;

      spelledLetters.push(letter);
      lastLetter = letter;
    });

    line2.textContent = spelledLetters.join("");
    line1.textContent = "kodläge";
    return;
  }

  // NORMAL MODE (LEVANDE)
const mapped = allWords.map(w => identifiers[w] || w);

// 🔥 FOKUS = senaste orden
let focus = mapped.slice(-3);

// 🔥 OM kort ord → visa 1 ord stort
if (focus.length >= 1 && focus[focus.length - 1].length <= 4) {
  focus = [focus[focus.length - 1]];
}

// 🔥 OM längre mening → visa 2–3 ord
if (mapped.join(" ").length > 30) {
  focus = mapped.slice(-3);
}

const text = focus.join(" ");

line2.textContent = text;
line1.textContent = "";

let size;

if (text.length <= 6) size = "18vw";       // 🔥 ENKELT ORD → STORT
else if (text.length <= 12) size = "14vw";
else if (text.length <= 20) size = "10vw";
else size = "7vw";

  line2.style.fontSize = size;
  line1.style.fontSize = size;
};

// AUTO RESTART
recognition.onend = () => {
  recognition.start();
};

// START
recognition.start();

// ADD WORD
document.getElementById("addBtn").onclick = async () => {
  const heard = prompt("Hur hördes ordet?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  identifiers[heard.toLowerCase()] = correct;

  await fetch(SUPABASE_URL + "/rest/v1/names", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify([{ heard, correct }])
  });

  alert("Sparat");
};

// EXPORT
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(identifiers, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "names.json";
  a.click();
};

// IMPORT
const fileInput = document.getElementById("fileInput");

document.getElementById("importBtn").onclick = () => fileInput.click();

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();
  const json = JSON.parse(text);

  identifiers = { ...identifiers, ...json };

  const entries = Object.entries(json).map(([heard, correct]) => ({
    heard,
    correct
  }));

  await fetch(SUPABASE_URL + "/rest/v1/names", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(entries)
  });

  alert("Importerat!");
};
</script>

</body>
</html>
