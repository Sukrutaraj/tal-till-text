<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<script>
const line2 = document.getElementById("line2");

let identifiers = {};

// 🔥 MENING
let currentSentence = [];

// 🔥 ANTI-DUPLICATE
let lastTranscript = "";

// 🔥 PAUS
let pauseTimer = null;
const PAUSE_LIMIT = 400;

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";
  if (w === "ellips" || w === "ellipsis") return "...";

  return w;
}

// 🔥 VISA MENING
function handlePause() {
  if (currentSentence.length === 0) return;

  let text = currentSentence.join(" ");

  text = text
    .replace(" .", ".")
    .replace(" ,", ",")
    .replace(" ?", "?")
    .replace(" !", "!")
    .replace(" ...", "...");

  line2.textContent = text;
  line2.style.fontSize = "8vw";

  // 🔥 RESET HELT RENT
  currentSentence = [];
  lastTranscript = "";
}

// 🔁 PAUS TIMER
function resetPauseTimer() {
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(handlePause, PAUSE_LIMIT);
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 SUPABASE
const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// LOAD
async function loadIdentifiers() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    identifiers = {};
    data.forEach(row => {
      identifiers[row.heard] = row.correct;
    });
  } catch {}
}
loadIdentifiers();

// 🔥 LIVE
recognition.onresult = (event) => {

  resetPauseTimer();

  const result = event.results[event.resultIndex];
  if (!result) return;

  const transcript = result[0].transcript.toLowerCase().trim();
  if (!transcript) return;

  // 🔥 TA BORT REDAN PROCESSAD TEXT
  let newPart = transcript.replace(lastTranscript, "").trim();

  lastTranscript = transcript;

  if (!newPart) return;

  const words = newPart.split(" ").filter(Boolean);

  // 🔥 BYGG MENING
  words.forEach(w => {
    const clean = normalizeWord(w);
    const finalWord = identifiers[clean] || clean;

    currentSentence.push(finalWord);
  });

  // 🔥 LIVE VISNING
  const lastWord = currentSentence[currentSentence.length - 1] || "";

  line2.textContent = lastWord;

  let size;
  if (lastWord.length <= 4) size = "20vw";
  else if (lastWord.length <= 8) size = "16vw";
  else size = "12vw";

  line2.style.fontSize = size;
};

// AUTO RESTART
recognition.onend = () => recognition.start();

// START
recognition.start();
</script>

</body>
</html>
