<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
}

/* 🔥 diskret knapp */
#uploadBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 24px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<button id="uploadBtn">＋</button>
<input type="file" id="fileInput" hidden>

<script>
const line2 = document.getElementById("line2");

let sentence = [];

// 🔥 NAMN-DATA
let identifiers = JSON.parse(localStorage.getItem("names") || "{}");

// 🔥 PAUS
let pauseTimer = null;
const PAUSE_LIMIT = 250;

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";
  if (w === "ellips") return "...";

  return findBestMatch(w);
}

// 🔥 FUZZY MATCH
function similarity(a, b) {
  let matches = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }
  return matches / Math.max(a.length, b.length);
}

function findBestMatch(word) {
  let best = word;
  let bestScore = 0;

  Object.keys(identifiers).forEach(key => {
    const score = similarity(word, key);
    if (score > bestScore && score > 0.6) {
      best = identifiers[key];
      bestScore = score;
    }
  });

  return best;
}

// 🔥 PAUS → visa mening
function handlePause() {
  if (sentence.length === 0) return;

  let text = sentence.join(" ");

  text = text
    .replace(" .", ".")
    .replace(" ,", ",")
    .replace(" ?", "?")
    .replace(" !", "!")
    .replace(" ...", "...");

  line2.textContent = text;
  line2.style.fontSize = "8vw";

  sentence = [];
}

// 🔁 PAUS TIMER
function resetPauseTimer() {
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(handlePause, PAUSE_LIMIT);
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 LIVE + FINAL
recognition.onresult = (event) => {

  resetPauseTimer();

  for (let i = event.resultIndex; i < event.results.length; i++) {

    const result = event.results[i];
    const transcript = result[0].transcript.toLowerCase().trim();
    if (!transcript) continue;

    const words = transcript.split(" ").filter(Boolean);

    // 🔥 LIVE
    const lastWord = normalizeWord(words[words.length - 1]);

    line2.textContent = lastWord;

    let size;
    if ([".", "?", "!", "..."].includes(lastWord)) size = "22vw";
    else if (lastWord.length <= 4) size = "20vw";
    else if (lastWord.length <= 8) size = "16vw";
    else size = "12vw";

    line2.style.fontSize = size;

    // 🔥 FINAL
    if (result.isFinal) {
      words.forEach(w => {
        sentence.push(normalizeWord(w));
      });
    }
  }
};

// 🔁 RESTART
recognition.onend = () => recognition.start();
recognition.start();

// =======================
// 📂 UPLOAD JSON
// =======================

const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();
  const json = JSON.parse(text);

  identifiers = { ...identifiers, ...json };

  // 🔥 SPARA
  localStorage.setItem("names", JSON.stringify(identifiers));

  alert("Namn inlästa");
};
</script>

</body>
</html>
