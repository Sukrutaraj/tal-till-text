<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathing Subtitles</title>

<style>
  body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
    transform: rotate(90deg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
  }

  #word {
    color: white;
    font-size: 18vw;
    font-weight: bold;
    text-align: center;
  }

  #controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    transform: rotate(-90deg);
  }

  button {
    font-size: 16px;
    padding: 10px 14px;
  }
</style>
</head>

<body>

<div id="word">Start</div>

<div id="controls">
  <button onclick="addWord()">➕ Lägg till ord</button>
</div>

<script>
const wordEl = document.getElementById("word");

let words = [];
let index = 0;
let isRunning = false;
let bufferTimer = null;

// 🧠 ORDLISTA (sparas i webbläsaren)
let dictionary = JSON.parse(localStorage.getItem("dictionary") || "{}");

// 🔧 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = false;

// 🧠 När text kommer (stabil version + buffert)
recognition.onresult = (event) => {
  const text = event.results[event.results.length - 1][0].transcript;

  clearTimeout(bufferTimer);

  bufferTimer = setTimeout(() => {
    words = text.split(" ");
    index = 0;
  }, 400); // 🟢 liten buffert = stabilare
};

// ▶️ WORD ENGINE (stabil)
function processWords() {
  if (!isRunning) return;

  if (index < words.length) {
    let word = words[index].toLowerCase();

    // 🔁 ersätt via ordlista
    if (dictionary[word]) {
      word = dictionary[word];
    }

    wordEl.textContent = word;
    index++;

    const delay = 250 + word.length * 25;

    setTimeout(processWords, delay);
  } else {
    setTimeout(processWords, 100);
  }
}

function start() {
  if (!isRunning) {
    isRunning = true;
    processWords();
  }
}

// ➕ LÄGG TILL ORD
function addWord() {
  const heard = prompt("Vad hörde appen?");
  if (!heard) return;

  const correct = prompt("Hur ska det visas?");
  if (!correct) return;

  dictionary[heard.toLowerCase()] = correct;

  localStorage.setItem("dictionary", JSON.stringify(dictionary));

  alert("Sparat!");
}

// starta
recognition.start();
start();
</script>

</body>
</html>
