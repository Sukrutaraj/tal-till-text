<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<script>
const line2 = document.getElementById("line2");

// 🔥 NAMN (optimerad lista)
let identifiers = {

  // Deepak
  "deepak": "Deepak",
  "dipak": "Deepak",
  "depak": "Deepak",
  "de pak": "Deepak",
  "deebak": "Deepak",
  "dibak": "Deepak",
  "tipak": "Deepak",

  // Sukrutaraj
  "sukrutaraj": "Sukrutaraj",
  "sukataraj": "Sukrutaraj",
  "sukrataraj": "Sukrutaraj",
  "sukutaraj": "Sukrutaraj",
  "sukra raj": "Sukrutaraj",
  "sukra taraj": "Sukrutaraj",
  "sukrutraj": "Sukrutaraj",
  "sukru taraj": "Sukrutaraj",

  // Diabasen
  "diabasen": "Diabasen",
  "dibasen": "Diabasen",
  "dia basen": "Diabasen",

  // Nilis
  "nilis": "Nilis",
  "niliss": "Nilis",
  "nillis": "Nilis",
  "niles": "Nilis",

  // Glimmern
  "glimmern": "Glimmern",
  "glimern": "Glimmern",
  "glimren": "Glimmern"
};

// 🔥 MENING
let sentence = [];

// 🔥 PAUS
let pauseTimer = null;
const PAUSE_LIMIT = 250;

// 🔤 LJUD-FÖRENKLING (viktig!)
function simplify(word) {
  return word
    .toLowerCase()
    .replace(/ee/g, "i")
    .replace(/oo/g, "o")
    .replace(/aa/g, "a")
    .replace(/ph/g, "f")
    .replace(/b/g, "p")
    .replace(/d/g, "t")
    .replace(/g/g, "k")
    .replace(/z/g, "s")
    .replace(/[^a-zåäö]/g, "");
}

// 🔥 SIMILARITY
function similarity(a, b) {
  a = simplify(a);
  b = simplify(b);

  if (a === b) return 1;

  let matches = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }

  return matches / Math.max(a.length, b.length);
}

// 🔥 MATCHNING
function findBestMatch(word) {
  if (identifiers[word]) return identifiers[word];

  let best = word;
  let bestScore = 0;

  Object.keys(identifiers).forEach(key => {
    const score = similarity(word, key);

    if (score > bestScore && score > 0.35) {
      best = identifiers[key];
      bestScore = score;
    }
  });

  return best;
}

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";
  if (w === "ellips") return "...";

  return findBestMatch(w);
}

// 🔥 VISA MENING
function handlePause() {
  if (sentence.length === 0) return;

  let text = sentence.join(" ");

  text = text
    .replace(" .", ".")
    .replace(" ,", ",")
    .replace(" ?", "?")
    .replace(" !", "!")
    .replace(" ...", "...");

  line2.textContent = text;
  line2.style.fontSize = "8vw";

  sentence = [];
}

// 🔁 PAUS
function resetPauseTimer() {
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(handlePause, PAUSE_LIMIT);
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 LIVE + FINAL
recognition.onresult = (event) => {

  resetPauseTimer();

  for (let i = event.resultIndex; i < event.results.length; i++) {

    const result = event.results[i];
    const transcript = result[0].transcript.toLowerCase().trim();
    if (!transcript) continue;

    const words = transcript.split(" ").filter(Boolean);

    // 🔥 LIVE
    const lastWord = normalizeWord(words[words.length - 1]);

    line2.textContent = lastWord;

    let size;
    if ([".", "?", "!", "..."].includes(lastWord)) size = "22vw";
    else if (lastWord.length <= 4) size = "20vw";
    else if (lastWord.length <= 8) size = "16vw";
    else size = "12vw";

    line2.style.fontSize = size;

    // 🔥 FINAL → bygg mening
    if (result.isFinal) {
      words.forEach(w => {
        sentence.push(normalizeWord(w));
      });
    }
  }
};

// AUTO RESTART
recognition.onend = () => recognition.start();

// START
recognition.start();
</script>

</body>
</html>
