<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
}

#line2 {
  font-size: 12vw;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<script>
const line2 = document.getElementById("line2");

let identifiers = {};

let spellingMode = false;
let spelledLetters = [];
let lastProcessedText = "";
let lastLetter = "";

// 🔥 NY SIDA FLAGGA
let newPage = false;

// 🔥 PAUS SYSTEM
let pauseTimer = null;
const PAUSE_LIMIT = 1200;

function resetPauseTimer() {
  clearTimeout(pauseTimer);

  pauseTimer = setTimeout(() => {
    newPage = true;
  }, PAUSE_LIMIT);
}

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";

  return w;
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 SUPABASE
const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// LOAD
async function loadIdentifiers() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    identifiers = {};
    data.forEach(row => {
      identifiers[row.heard] = row.correct;
    });
  } catch {}
}
loadIdentifiers();

// 🔥 LIVE
recognition.onresult = (event) => {

  resetPauseTimer();

  let fullText = "";

  for (let i = 0; i < event.results.length; i++) {
    fullText += event.results[i][0].transcript;
  }

  fullText = fullText.toLowerCase().trim();

  // ✅ RÄTT ORDNING
  if (newPage) {
    lastProcessedText = "";
    newPage = false;
  }

  let newText = fullText.replace(lastProcessedText, "").trim();
  if (!newText) return;

  lastProcessedText = fullText;

  const words = newText.split(" ").filter(Boolean);
  const allWords = fullText.split(" ").filter(Boolean);
  const joined = words.join("");

  // 🔥 START SPELLING
  if (
    joined.includes("dingdongstart") ||
    (joined.includes("dingdong") && joined.includes("start"))
  ) {
    spellingMode = true;
    spelledLetters = [];
    lastLetter = "";
    lastProcessedText = "";
    line2.textContent = "…";
    return;
  }

  // 🔥 END SPELLING
  if (
    spellingMode &&
    (
      joined.includes("dingdongstopp") ||
      (joined.includes("dingdong") && joined.includes("stopp"))
    )
  ) {
    const name = spelledLetters.join("");

    identifiers[name.toLowerCase()] = name;

    fetch(SUPABASE_URL + "/rest/v1/names", {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify([{ heard: name.toLowerCase(), correct: name }])
    });

    spellingMode = false;
    lastProcessedText = "";

    line2.textContent = name;
    return;
  }

  // 🔤 SPELLING MODE
  if (spellingMode) {
    words.forEach(w => {
      const letter = w[0];
      if (!letter.match(/[a-zåäö]/)) return;
      if (letter === lastLetter) return;

      spelledLetters.push(letter);
      lastLetter = letter;
    });

    line2.textContent = spelledLetters.join("");
    return;
  }

  // 🔥 NORMAL MODE
  const mapped = allWords.map(w => {
    const clean = normalizeWord(w);
    return identifiers[clean] || clean;
  });

  let focus = mapped.slice(-3);

  if (focus.length >= 1 && focus[focus.length - 1].length <= 4) {
    focus = [focus[focus.length - 1]];
  }

  if (mapped.join(" ").length > 30) {
    focus = mapped.slice(-3);
  }

  let text = focus.join(" ");

  text = text
    .replace(" .", ".")
    .replace(" ,", ",")
    .replace(" ?", "?")
    .replace(" !", "!");

  line2.textContent = text;

  // 🔠 DYNAMISK STORLEK
  let size;
  if (text.length <= 6) size = "18vw";
  else if (text.length <= 12) size = "14vw";
  else if (text.length <= 20) size = "10vw";
  else size = "7vw";

  line2.style.fontSize = size;
};

// AUTO RESTART
recognition.onend = () => {
  recognition.start();
};

// START
recognition.start();
</script>

</body>
</html>
