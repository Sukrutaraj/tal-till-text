<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  font-size: 16px;
  padding: 10px;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<div id="controls">
  <button id="addBtn">＋</button>
</div>

<script>
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

let identifiers = {};

// 🔤 SPELLING STATE
let spellingMode = false;
let spelledLetters = [];
let lastLetter = "";
let lastTime = 0;

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 SUPABASE
const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// LOAD
async function loadIdentifiers() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  identifiers = {};
  data.forEach(row => {
    identifiers[row.heard] = row.correct;
  });
}
loadIdentifiers();

// 🔤 EXTRAHERA BOKSTAV
function extractLetter(word) {
  if (!word) return "";

  // ta första bokstav
  const letter = word[0];

  if (letter.match(/[a-zåäö]/)) {
    return letter;
  }

  return "";
}

// 🔥 LIVE
recognition.onresult = (event) => {
  let text = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    text += event.results[i][0].transcript;
  }

  const words = text.toLowerCase().split(" ").filter(Boolean);

  // START SPELLING
  if (words.includes("bokstavera")) {
    spellingMode = true;
    spelledLetters = [];
    lastLetter = "";
    line2.textContent = "…";
    return;
  }

  // END SPELLING
  if (spellingMode && words.includes("klart")) {
    const name = spelledLetters.join("");

    identifiers[name.toLowerCase()] = name;

    fetch(SUPABASE_URL + "/rest/v1/names", {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify([{ heard: name.toLowerCase(), correct: name }])
    });

    spellingMode = false;
    line2.textContent = name;
    line1.textContent = "";
    return;
  }

  // SPELLING MODE
  if (spellingMode) {
    const now = Date.now();

    words.forEach(w => {
      const letter = extractLetter(w);

      if (!letter) return;

      // 🔥 ignorera spam
      if (letter === lastLetter && now - lastTime < 300) return;

      spelledLetters.push(letter);

      lastLetter = letter;
      lastTime = now;
    });

    line2.textContent = spelledLetters.join("");
    line1.textContent = "bokstavering";
    return;
  }

  // NORMAL
  const mapped = words.map(w => identifiers[w] || w);

  const current = mapped.slice(-4);
  const previous = mapped.slice(-8, -4);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  const length = line2.textContent.length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};

// AUTO RESTART
recognition.onend = () => recognition.start();

// START
recognition.start();

// ADD WORD
document.getElementById("addBtn").onclick = async () => {
  const heard = prompt("Hur hördes ordet?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  identifiers[heard.toLowerCase()] = correct;

  await fetch(SUPABASE_URL + "/rest/v1/names", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify([{ heard, correct }])
  });

  alert("Sparat");
};
</script>

</body>
</html>
