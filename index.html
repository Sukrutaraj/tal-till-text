<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<script>
const line2 = document.getElementById("line2");

// 🔥 MENING (endast FINAL)
let sentence = [];

// 🔥 PAUS
let pauseTimer = null;
const PAUSE_LIMIT = 500;

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";
  if (w === "ellips") return "...";

  return w;
}

// 🔥 VISA MENING
function handlePause() {
  if (sentence.length === 0) return;

  let text = sentence.join(" ");

  text = text
    .replace(" .", ".")
    .replace(" ,", ",")
    .replace(" ?", "?")
    .replace(" !", "!")
    .replace(" ...", "...");

  line2.textContent = text;
  line2.style.fontSize = "8vw";

  // 🔥 RESET
  sentence = [];
}

// 🔁 PAUS TIMER
function resetPauseTimer() {
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(handlePause, PAUSE_LIMIT);
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 LIVE
recognition.onresult = (event) => {

  resetPauseTimer();

  for (let i = event.resultIndex; i < event.results.length; i++) {

    const result = event.results[i];
    const transcript = result[0].transcript.toLowerCase().trim();

    if (!transcript) continue;

    const words = transcript.split(" ").filter(Boolean);

    // 🔥 LIVE (ALLTID visa sista ord)
    const lastWord = words[words.length - 1];

    line2.textContent = lastWord;

    let size;
    if (lastWord.length <= 4) size = "20vw";
    else if (lastWord.length <= 8) size = "16vw";
    else size = "12vw";

    line2.style.fontSize = size;

    // 🔥 ENDAST FINAL → bygg mening
    if (result.isFinal) {
      words.forEach(w => {
        sentence.push(normalizeWord(w));
      });
    }
  }
};

// AUTO RESTART
recognition.onend = () => recognition.start();

// START
recognition.start();
</script>

</body>
</html>
