<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

#container.fullscreen {
  width: 100vw;
  height: 100vh;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

button {
  position: fixed;
  bottom: 20px;
  font-size: 18px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
}

#fsBtn { right: 20px; }
#addBtn { right: 80px; }
#editBtn { right: 140px; }
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<button id="fsBtn">⛶</button>
<button id="addBtn">＋</button>
<button id="editBtn">✎</button>

<script>
const container = document.getElementById("container");
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

// 🔌 SERVER
const socket = new WebSocket("wss://speech-server-0b86.onrender.com");
const API = "https://speech-server-0b86.onrender.com";

// 🧠 IDENTIFIERS (server)
let identifiers = {};
let lastText = "";

// 🔥 TRIGGERS
const triggers = [
  "mitt namn är",
  "jag heter",
  "jag kallas",
  "detta är",
  "det här är",
  "vi är på",
  "jag är på",
  "platsen heter",
  "verksamheten heter"
];

// 🔥 HÄMTA DATA
async function loadIdentifiers() {
  try {
    const res = await fetch(API + "/names");
    identifiers = await res.json();
    console.log("Loaded identifiers:", identifiers);
  } catch {
    console.log("Kunde inte ladda identifiers");
  }
}
loadIdentifiers();

// 🎤 MICROPHONE
navigator.mediaDevices.getUserMedia({
  audio: {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
    channelCount: 1,
    sampleRate: 16000
  }
}).then(stream => {

  const mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.start(100);

  mediaRecorder.ondataavailable = (e) => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };

});

// 🔥 TEXT FLOW
socket.onmessage = (event) => {
  let text = event.data
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .trim();

  if (!text || text === lastText) return;
  lastText = text;

  let words = text.split(" ").filter(Boolean);

  let fullSentence = words.join(" ");

  let shouldReplace = triggers.some(trigger =>
    fullSentence.includes(trigger)
  );

  if (shouldReplace) {
    words = words.map(w => identifiers[w] || w);
  }

  let current = words.slice(-4);
  let previous = words.slice(-8, -4);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  const length = line2.textContent.length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};

// ➕ ADD IDENTIFIER
document.getElementById("addBtn").onclick = async () => {
  const heard = prompt("Hur hördes ordet?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  await fetch(API + "/names", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ heard, correct })
  });

  identifiers[heard.toLowerCase()] = correct;

  alert("Sparat!");
};

// ✏️ DELETE
document.getElementById("editBtn").onclick = () => {
  let list = Object.keys(identifiers).join("\n");

  const word = prompt("Sparade:\n" + list + "\n\nVilket vill du ta bort?");
  if (!word) return;

  delete identifiers[word.toLowerCase()];

  alert("Borttagen lokalt");
};

// 🔘 FULLSCREEN
let isFullscreen = false;

document.getElementById("fsBtn").onclick = () => {
  isFullscreen = !isFullscreen;

  if (isFullscreen) {
    container.classList.add("fullscreen");
  } else {
    container.classList.remove("fullscreen");
  }
};
</script>

</body>
</html>
