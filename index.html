<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
}
</style>
</head>

<body>

<div id="container">
  <div id="line2" class="line">Start</div>
</div>

<script>
const line2 = document.getElementById("line2");

let identifiers = {};

let lastProcessedText = "";

// 🔥 MENINGSBUFFER
let sentenceBuffer = [];

// 🔥 PAUS
let pauseTimer = null;
const PAUSE_LIMIT = 500;

// 🔤 NORMALISERA
function normalizeWord(w) {
  w = w.toLowerCase();

  if (w === "punkt") return ".";
  if (w === "frågetecken") return "?";
  if (w === "komma") return ",";
  if (w === "utropstecken") return "!";

  return w;
}

// 🔥 PAUS = VISA HEL MENING
function resetPauseTimer() {
  clearTimeout(pauseTimer);

  pauseTimer = setTimeout(() => {
    if (sentenceBuffer.length > 0) {

      let text = sentenceBuffer.join(" ");

      text = text
        .replace(" .", ".")
        .replace(" ,", ",")
        .replace(" ?", "?")
        .replace(" !", "!");

      // 🔥 visa hela meningen
      line2.textContent = text;

      // mindre storlek för mening
      line2.style.fontSize = "8vw";
    }

    // 🔥 reset
    sentenceBuffer = [];
    lastProcessedText = "";

  }, PAUSE_LIMIT);
}

// 🔥 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 SUPABASE
const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// LOAD
async function loadIdentifiers() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    identifiers = {};
    data.forEach(row => {
      identifiers[row.heard] = row.correct;
    });
  } catch {}
}
loadIdentifiers();

// 🔥 LIVE
recognition.onresult = (event) => {

  resetPauseTimer();

  let fullText = "";

  for (let i = 0; i < event.results.length; i++) {
    fullText += event.results[i][0].transcript;
  }

  fullText = fullText.toLowerCase().trim();

  let newText = fullText.replace(lastProcessedText, "").trim();
  if (!newText) return;

  lastProcessedText = fullText;

  const words = newText.split(" ").filter(Boolean);

  // 🔥 bygg mening
  words.forEach(w => {
    const clean = normalizeWord(w);
    const finalWord = identifiers[clean] || clean;

    sentenceBuffer.push(finalWord);
  });

  // 🔥 LIVE VISNING (senaste ord)
  const lastWord = sentenceBuffer[sentenceBuffer.length - 1] || "";

  line2.textContent = lastWord;

  let size;
  if (lastWord.length <= 4) size = "20vw";
  else if (lastWord.length <= 8) size = "16vw";
  else size = "12vw";

  line2.style.fontSize = size;
};

// AUTO RESTART
recognition.onend = () => recognition.start();

// START
recognition.start();
</script>

</body>
</html>
