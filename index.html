<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

#container.fullscreen {
  width: 100vw;
  height: 100vh;
}

/* text */
.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

/* buttons */
button {
  position: fixed;
  bottom: 20px;
  font-size: 18px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
}

#fsBtn { right: 20px; }
#nameBtn { right: 80px; }
#editBtn { right: 140px; }

.fullscreen button {
  opacity: 0.2;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<button id="fsBtn">⛶</button>
<button id="nameBtn">＋N</button>
<button id="editBtn">✎</button>

<script>
const container = document.getElementById("container");
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

// 🔌 SERVER
const socket = new WebSocket("wss://speech-server-0b86.onrender.com");
const API = "https://speech-server-0b86.onrender.com";

// 🧠 NAMN (från server)
let names = {};
let lastText = "";

// 🔥 HÄMTA NAMN VID START
async function loadNames() {
  try {
    const res = await fetch(API + "/names");
    names = await res.json();
    console.log("Names loaded:", names);
  } catch (e) {
    console.error("Could not load names");
  }
}

loadNames();

// 🎤 MICROPHONE
navigator.mediaDevices.getUserMedia({
  audio: {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
    channelCount: 1,
    sampleRate: 16000
  }
}).then(stream => {

  const mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.start(100);

  mediaRecorder.ondataavailable = (e) => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };

});

// 🔥 TEXT FLOW
socket.onmessage = (event) => {
  let text = event.data
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .trim();

  if (!text || text === lastText) return;
  lastText = text;

  let words = text.split(" ").filter(Boolean);

  // 🔥 ersätt namn från server
  words = words.map(w => names[w] || w);

  let current = words.slice(-4);
  let previous = words.slice(-8, -4);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  const length = line2.textContent.length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};

//
// ➕ ADD NAME (sparas till server)
//
document.getElementById("nameBtn").onclick = async () => {
  const heard = prompt("Hur hördes namnet?");
  if (!heard) return;

  const correct = prompt("Hur ska det vara?");
  if (!correct) return;

  try {
    await fetch(API + "/names", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ heard, correct })
    });

    // uppdatera lokalt direkt
    names[heard.toLowerCase()] = correct;

    alert("Sparat!");
  } catch {
    alert("Kunde inte spara");
  }
};

//
// ✏️ DELETE NAME (från server + lokalt)
//
document.getElementById("editBtn").onclick = () => {
  let list = Object.keys(names).join("\n");

  const word = prompt("Sparade namn:\n" + list + "\n\nVilket vill du ta bort?");
  if (!word) return;

  delete names[word.toLowerCase()];

  alert("Borttagen lokalt (server reset rensar helt)");
};

//
// 🔘 FULLSCREEN
//
let isFullscreen = false;

document.getElementById("fsBtn").onclick = () => {
  isFullscreen = !isFullscreen;

  if (isFullscreen) {
    container.classList.add("fullscreen");
  } else {
    container.classList.remove("fullscreen");
  }
};
</script>
</script>

</body>
</html>
