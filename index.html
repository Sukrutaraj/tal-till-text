<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  font-size: 16px;
  padding: 10px;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<div id="controls">
  <button id="addBtn">＋</button>
</div>

<script>
const DEEPGRAM_KEY = "0010773f2290220c0e6e6a7084fe14acfc9f7c82";

const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtcXNrb2h1cnV4ZGFneXZvd2dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjUyMDgsImV4cCI6MjA5MjM0MTIwOH0.rSCBJ_N6r8e8VV9oohxO6Eyvj0BPi4Y8xTPkATNTfaM";

const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

let identifiers = {};
let lastFinal = "";

// 🔥 LOAD NAMES
async function loadIdentifiers() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  identifiers = {};
  data.forEach(row => {
    identifiers[row.heard] = row.correct;
  });
}
loadIdentifiers();

// 🎤 MIC + DEEPGRAM
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

 const socket = new WebSocket(
  "wss://api.deepgram.com/v1/listen?model=nova-2&language=sv&encoding=webm",
  ["token", DEEPGRAM_KEY]
);

socket.onopen = () => {

  // 🔥 Kolla stöd (viktig för Safari)
  const options = MediaRecorder.isTypeSupported("audio/webm")
    ? { mimeType: "audio/webm" }
    : {};

  const recorder = new MediaRecorder(stream, options);

  recorder.ondataavailable = e => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };

  recorder.start(500);
};
  
  socket.onmessage = (message) => {
    const data = JSON.parse(message.data);

    const transcript = data.channel?.alternatives[0]?.transcript;

    if (!transcript) return;

    const words = transcript.toLowerCase().split(" ");

    const mapped = words.map(w => identifiers[w] || w);

    const current = mapped.slice(-4);
    const previous = mapped.slice(-8, -4);

    line2.textContent = current.join(" ");
    line1.textContent = previous.join(" ");

    const length = line2.textContent.length;

    let size;
    if (length <= 10) size = "14vw";
    else if (length <= 20) size = "10vw";
    else size = "7vw";

    line1.style.fontSize = size;
    line2.style.fontSize = size;
  };

});

// ➕ ADD WORD
document.getElementById("addBtn").onclick = async () => {
  const heard = prompt("Hur hördes ordet?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  identifiers[heard.toLowerCase()] = correct;

  await fetch(SUPABASE_URL + "/rest/v1/names", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify([{ heard, correct }])
  });

  alert("Sparat");
};
</script>

</body>
</html>
