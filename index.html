<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Live Subtitles</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  overflow: hidden;
}

#word {
  color: white;
  font-weight: bold;
  text-align: center;
  max-width: 90vw;
  word-break: break-word;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

button {
  position: fixed;
  font-size: 16px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: white;
  color: black;
}

#addBtn { bottom: 20px; right: 20px; }
#exportBtn { bottom: 20px; right: 80px; }
#importBtn { bottom: 20px; right: 140px; }
</style>
</head>

<body>

<div id="word">Start</div>

<button id="addBtn">＋</button>
<button id="exportBtn">⬇️</button>
<button id="importBtn">⬆️</button>
<input type="file" id="importFile" style="display:none" />

<script>
const wordEl = document.getElementById("word");
const addBtn = document.getElementById("addBtn");
const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const importFile = document.getElementById("importFile");

// 🔄 dictionary
let dictionary = JSON.parse(localStorage.getItem("dictionary") || {});

// 🧠 state
let finalTranscript = "";
let currentTranscript = "";
let lastWordCount = 0;
let lastWord = "";

const WINDOW_SIZE = 3;

// 🎤 SPEECH
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🎯 LIVE RESULT
recognition.onresult = (event) => {
  let interim = "";
  let final = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    const transcript = event.results[i][0].transcript
      .toLowerCase()
      .replace(/[.,!?]/g, "")
      .trim();

    if (event.results[i].isFinal) {
      final += transcript + " ";
    } else {
      interim += transcript;
    }
  }

  finalTranscript += final;
  currentTranscript = interim;

  updateDisplay();
};

// 🔠 DISPLAY LOGIK (INGA UPPREPNINGAR)
function updateDisplay() {
  const fullText = (finalTranscript + " " + currentTranscript).trim();

  let words = fullText.split(" ").filter(Boolean);

  if (words.length === 0) return;

  // 🔥 endast nya ord
  if (words.length <= lastWordCount) return;

  const newWords = words.slice(lastWordCount);
  lastWordCount = words.length;

  // 🔥 visa chunk
  let chunk = newWords.slice(-WINDOW_SIZE);

  chunk = chunk.map(w => dictionary[w] || w);

  const text = chunk.join(" ");
  wordEl.textContent = text;

  lastWord = chunk[chunk.length - 1];

  // 🔠 dynamisk storlek
  const length = text.length;

  let size;
  if (length <= 10) size = "16vw";
  else if (length <= 20) size = "12vw";
  else if (length <= 30) size = "9vw";
  else size = "6vw";

  wordEl.style.fontSize = size;
}

// 🔁 AUTO RESTART
recognition.onend = () => recognition.start();
recognition.onerror = () => recognition.start();

// ➕ LÄGG TILL ORD
addBtn.onclick = () => {
  const correct = prompt("Skriv rätt ord:");
  if (!correct) return;

  if (lastWord) {
    dictionary[lastWord] = capitalize(correct);
    localStorage.setItem("dictionary", JSON.stringify(dictionary));
    alert("Sparat!");
  }
};

// ⬇️ EXPORT
exportBtn.onclick = () => {
  const dataStr = JSON.stringify(dictionary, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "dictionary.json";
  a.click();
  URL.revokeObjectURL(url);
};

// ⬆️ IMPORT
importBtn.onclick = () => importFile.click();

importFile.onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      dictionary = { ...dictionary, ...imported };
      localStorage.setItem("dictionary", JSON.stringify(dictionary));
      alert("Importerat!");
    } catch {
      alert("Fel fil");
    }
  };

  reader.readAsText(file);
};

// 🔤 helper
function capitalize(word) {
  return word.charAt(0).toUpperCase() + word.slice(1);
}

// ▶️ START
recognition.start();
</script>

</body>
</html>
