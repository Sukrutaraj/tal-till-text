<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

#container.fullscreen {
  width: 100vw;
  height: 100vh;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

.fullscreen .line {
  margin: 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

button {
  position: fixed;
  bottom: 20px;
  font-size: 18px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
}

#addBtn { right: 20px; }
#exportBtn { right: 80px; }
#importBtn { right: 140px; }

.fullscreen button {
  display: none;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<button id="addBtn">＋</button>
<button id="exportBtn">⬇️</button>
<button id="importBtn">⬆️</button>
<input type="file" id="importFile" style="display:none" />

<script>
const container = document.getElementById("container");
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

// 🔌 SERVER
const socket = new WebSocket("wss://speech-server-0b86.onrender.com");

// 🧠 dictionary
let dictionary = JSON.parse(localStorage.getItem("dictionary") || {});
let lastText = "";

// 🎤 MICROPHONE (OPTIMERAD)
navigator.mediaDevices.getUserMedia({
  audio: {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
    channelCount: 1,
    sampleRate: 16000
  }
}).then(stream => {

  const mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.start(100);

  mediaRecorder.ondataavailable = (e) => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };

}).catch(err => {
  console.error("Mic error:", err);
});

// 🔥 TEXT FLOW
socket.onmessage = (event) => {
  let text = event.data
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .trim();

  if (!text || text === lastText) return;

  lastText = text;

  let words = text.split(" ").filter(Boolean);

  let current = words.slice(-4);
  let previous = words.slice(-8, -4);

  current = current.map(w => dictionary[w] || w);
  previous = previous.map(w => dictionary[w] || w);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  const length = line2.textContent.length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};

// ➕ ADD WORD (KONTROLLERAD)
document.getElementById("addBtn").onclick = () => {
  const heard = prompt("Vilket ord var fel?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  dictionary[heard.toLowerCase()] = correct;
  localStorage.setItem("dictionary", JSON.stringify(dictionary));

  alert("Sparat: " + heard + " → " + correct);
};

// ⬇️ EXPORT (FIXAD FÖR IPHONE)
document.getElementById("exportBtn").onclick = () => {
  const data = JSON.stringify(dictionary, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  window.open(url, "_blank");

  alert("Tryck på dela-knappen → 'Spara i Filer'");
};

// ⬆️ IMPORT
const importFile = document.getElementById("importFile");

document.getElementById("importBtn").onclick = () => importFile.click();

importFile.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);

      dictionary = { ...dictionary, ...imported };
      localStorage.setItem("dictionary", JSON.stringify(dictionary));

      alert("Ordbok importerad");
    } catch {
      alert("Fel fil");
    }
  };

  reader.readAsText(file);
};

// 🔥 FULLSCREEN (HÅLL FINGER)
let isFullscreen = false;
let pressTimer;

document.body.addEventListener("touchstart", () => {
  pressTimer = setTimeout(() => {
    isFullscreen = !isFullscreen;

    if (isFullscreen) {
      container.classList.add("fullscreen");
    } else {
      container.classList.remove("fullscreen");
    }
  }, 500);
});

document.body.addEventListener("touchend", () => {
  clearTimeout(pressTimer);
});
</script>

</body>
</html>
