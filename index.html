<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  font-size: 16px;
  padding: 10px;
}
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<div id="controls">
  <button id="addBtn">＋</button>
</div>

<script>
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

let identifiers = {};

// 🔤 SPELLING STATE
let spellingMode = false;
let spelledLetters = [];

// 🔤 NORMALIZE LETTER (fixar sss → s)
function normalizeLetter(word) {
  if (!word) return "";
  return word[0]; // ta första bokstaven
}

// 🔥 SPEECH API
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "sv-SE";
recognition.continuous = true;
recognition.interimResults = true;

// 🔥 SUPABASE
const SUPABASE_URL = "https://smqskohuruxdagyvowge.supabase.co";
const SUPABASE_KEY = "DIN KEY";

// 🔥 LOAD
async function loadIdentifiers() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/names", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    identifiers = {};
    data.forEach(row => {
      identifiers[row.heard] = row.correct;
    });
  } catch (e) {
    console.log("load error");
  }
}
loadIdentifiers();

// 🔥 LIVE TEXT
recognition.onresult = (event) => {
  let text = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    text += event.results[i][0].transcript;
  }

  const words = text.toLowerCase().split(" ").filter(Boolean);

  // 🔤 START SPELLING
  if (words.includes("bokstavera")) {
    spellingMode = true;
    spelledLetters = [];
    line2.textContent = "…";
    return;
  }

  // 🔤 END SPELLING
  if (spellingMode && words.includes("klart")) {
    const name = spelledLetters.join("");

    identifiers[name.toLowerCase()] = name;

    fetch(SUPABASE_URL + "/rest/v1/names", {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify([{ heard: name.toLowerCase(), correct: name }])
    });

    spellingMode = false;
    spelledLetters = [];

    line2.textContent = name;
    line1.textContent = "";
    return;
  }

  // 🔤 COLLECT LETTERS (robust)
  if (spellingMode) {
    words.forEach(w => {
      const letter = normalizeLetter(w);

      if (letter.match(/[a-zåäö]/)) {

        // undvik dubletter (sss → s)
        const last = spelledLetters[spelledLetters.length - 1];
        if (last !== letter) {
          spelledLetters.push(letter);
        }
      }
    });

    line2.textContent = spelledLetters.join("");
    line1.textContent = "bokstavering";
    return;
  }

  // 🔥 NORMAL MODE
  const mapped = words.map(w => identifiers[w] || w);

  const current = mapped.slice(-4);
  const previous = mapped.slice(-8, -4);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  const length = line2.textContent.length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};

// 🔁 AUTO RESTART
recognition.onend = () => {
  recognition.start();
};

// ▶️ START
recognition.start();

// ➕ ADD WORD
document.getElementById("addBtn").onclick = async () => {
  const heard = prompt("Hur hördes ordet?");
  if (!heard) return;

  const correct = prompt("Vad ska det vara?");
  if (!correct) return;

  identifiers[heard.toLowerCase()] = correct;

  await fetch(SUPABASE_URL + "/rest/v1/names", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify([{ heard, correct }])
  });

  alert("Sparat");
};
</script>

</body>
</html>
