<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Subtitles</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

#container {
  width: 90vw;
  text-align: center;
}

.line {
  color: white;
  font-weight: bold;
  line-height: 1.2;
  margin: 10px 0;
}

#line1 { opacity: 0.6; }
#line2 { opacity: 1; }
</style>
</head>

<body>

<div id="container">
  <div id="line1" class="line"></div>
  <div id="line2" class="line">Start</div>
</div>

<script>
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

// 🔌 SERVER
const socket = new WebSocket("wss://speech-server-0b86.onrender.com");

// 🧠 dictionary
let dictionary = JSON.parse(localStorage.getItem("dictionary") || {});
let lastText = "";

// 🎤 MICROPHONE
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  const mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.start(100);

  mediaRecorder.ondataavailable = (e) => {
    if (socket.readyState === 1) {
      socket.send(e.data);
    }
  };
});

// 🔥 TEXT FLOW (STABIL)
socket.onmessage = (event) => {
  let text = event.data
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .trim();

  if (!text || text === lastText) return;

  lastText = text;

  let words = text.split(" ").filter(Boolean);

  // 🔥 dela upp i två rader
  let current = words.slice(-4);
  let previous = words.slice(-8, -4);

  current = current.map(w => dictionary[w] || w);
  previous = previous.map(w => dictionary[w] || w);

  line2.textContent = current.join(" ");
  line1.textContent = previous.join(" ");

  // 🔠 dynamisk storlek
  const length = current.join(" ").length;

  let size;
  if (length <= 10) size = "14vw";
  else if (length <= 20) size = "10vw";
  else size = "7vw";

  line1.style.fontSize = size;
  line2.style.fontSize = size;
};
</script>

</body>
</html>
